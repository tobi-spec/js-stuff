<html>

<head>
  <title>Simple Library Import</title>
    <script src="https://cdn.jsdelivr.net/npm/lodash"></script>

</head>

<body>
    <h1>Simple Library Import</h1>
    <p>Functions from lodash are used in script tag and shown in console.</p>
</body>

<script>
    // Lodash is available as "_"
    const nums = [1, 2, 3, 4, 5];

    console.log(_.chunk(nums, 2));       // [[1,2],[3,4],[5]]
    console.log(_.uniq([1, 1, 2, 3]));   // [1,2,3]
</script>

</html>
